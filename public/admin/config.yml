backend:
  name: github
  repo: Liux340/pan-resource
  branch: main
  site_domain: pan-resource.pages.dev

media_folder: 'public/images'
public_folder: '/images'

collections:
  - name: 'resources'
    label: '资源管理'
    label_singular: '资源'
    folder: 'src/content/resources'
    create: true
    delete: true
    format: 'frontmatter'
    editor:
      preview: false
    slug: '{{slug}}'
    fields:
      - { label: '标题', name: 'title', widget: 'string' }
      - { label: 'Slug', name: 'slug', widget: 'string', hint: 'URL标识，如 my-resource' }
      - { label: '简介', name: 'description', widget: 'text' }
      - { label: '封面图片', name: 'cover', widget: 'image', required: false }
      - { label: '分类', name: 'category', widget: 'string' }
      - {
          label: '标签',
          name: 'tags',
          widget: 'list',
          required: false,
          field: { label: '标签', name: 'tag', widget: 'string' },
        }
      - { label: '发布时间', name: 'publishDate', widget: 'datetime', format: 'YYYY-MM-DD' }
      - { label: '更新时间', name: 'updateDate', widget: 'datetime', format: 'YYYY-MM-DD', required: false }
      - { label: '夸克网盘链接', name: '夸克链接', widget: 'string', required: false }
      - { label: '百度网盘链接', name: '百度链接', widget: 'string', required: false }
      - { label: '迅雷网盘链接', name: '迅雷链接', widget: 'string', required: false }
      - { label: '推荐资源', name: 'recommended', widget: 'boolean', default: false, required: false }
      - { label: '热门资源', name: 'popular', widget: 'boolean', default: false, required: false }
      - { label: '正文内容', name: 'body', widget: 'markdown' }

  - name: 'categories'
    label: '分类管理'
    create: true
    delete: true
    format: 'yml'
    folder: 'src/content/categories'
    slug: '{{slug}}'
    fields:
      - { label: '名称', name: 'name', widget: 'string' }
      - { label: 'Slug', name: 'slug', widget: 'string' }
      - { label: '图标', name: 'icon', widget: 'string', hint: '如 💻 📚 🎬' }